<!DOCTYPE html>
<html>
<head>
    <title>Color Scheme</title>
</head>
<body>

    <img src="image1.jpg" alt="image1" width="1280" height="716" class="header-image">

    <table>
        <thead>
            <tr>
                <th colspan="4" class="scheme-header">SCHEME: TROPICAL PARADISE</th>
            </tr>
            <tr style="background-color: #eeeeee;">
                <th>Color Name</th>
                <th>Hex</th>
                <th>RGB</th>
                <th>HSL</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="color-preview" style="background-color: #007791; color: white;">Deep sea</td>
                <td>#007791</td>
                <td>rgb(0, 119, 145)</td>
                <td>hsl(191, 100%, 28%)</td>
            </tr>
            <tr>
                <td class="color-preview" style="background-color: #40E0D0; color: black;">Shallow waters</td>
                <td>#40E0D0</td>
                <td>rgb(64, 224, 208)</td>
                <td>hsl(174, 72%, 56%)</td>
            </tr>
            <tr>
                <td class="color-preview" style="background-color: #F5E6CC; color: black;">Beach Sand</td>
                <td>#F5E6CC</td>
                <td>rgb(245, 230, 204)</td>
                <td>hsl(38, 67%, 88%)</td>
            </tr>
            <tr>
                <td class="color-preview" style="background-color: #2E8B57; color: white;">Leaves</td>
                <td>#2E8B57</td>
                <td>rgb(46, 139, 87)</td>
                <td>hsl(146, 50%, 36%)</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
